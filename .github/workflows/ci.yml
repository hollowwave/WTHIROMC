name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSVC toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry and build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check + build frontend
        run: npm run build

      - name: Run Rust unit + integration tests
        working-directory: src-tauri
        run: cargo test --all-features

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check
        continue-on-error: true # advisory for now - flip to blocking once the codebase is fully formatted

      - name: Run clippy lints
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
        continue-on-error: true # advisory for now - same reasoning as fmt
